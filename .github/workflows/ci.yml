name: IncomeOS CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Use stable npm
        run: npm install --global npm@10.8.1

      - run: npm ci

      - run: npm test

      - run: npm run ci
